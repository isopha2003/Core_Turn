<!DOCTYPE html>
<html>
<head>
    <title>Core Turn - Fixed</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #050505; cursor: pointer; }
        #ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        .msg { font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>CORE TURN</h1>
        <p class="msg">클릭해서 회전! 같은 색 면으로 조각을 막으세요.</p>
        <h2 id="score">Score: 0</h2>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    canvas.width = 400;
    canvas.height = 400;

    const COLORS = ['#FF4444', '#FFD700', '#44FF44', '#4444FF']; // 0:빨, 1:황, 2:초, 3:파
    let score = 0;
    let rotation = 0; 
    let enemies = [];
    let gameActive = true;

    // 클릭 시 90도 회전 및 재시작 처리
    canvas.addEventListener('mousedown', () => {
        if(!gameActive) { 
            resetGame();
            return; 
        }
        rotation += Math.PI / 2;
    });

    function resetGame() {
        score = 0;
        enemies = [];
        rotation = 0;
        gameActive = true;
        scoreElement.innerText = `Score: 0`;
        scoreElement.style.color = "white";
        update(); 
    }

    function spawnEnemy() {
        if(!gameActive) return;
        const angle = Math.random() * Math.PI * 2;
        const dist = 300;
        const colorIndex = Math.floor(Math.random() * 4);
        enemies.push({
            x: 200 + Math.cos(angle) * dist,
            y: 200 + Math.sin(angle) * dist,
            color: COLORS[colorIndex],
            colorIndex: colorIndex,
            speed: 1.5 + (score * 0.02),
            size: 10
        });
    }

    setInterval(spawnEnemy, 1000);

    function drawGameOver() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 35px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", 200, 190);
        ctx.font = "18px Arial";
        ctx.fillStyle = "#aaa";
        ctx.fillText(`Final Score: ${score}`, 200, 225);
        ctx.font = "14px Arial";
        ctx.fillText("클릭해서 다시 도전", 200, 260);
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- 1. 중앙 코어 그리기 ---
        ctx.save();
        ctx.translate(200, 200);
        ctx.rotate(rotation);
        
        for(let i=0; i<4; i++) {
            ctx.beginPath();
            ctx.strokeStyle = COLORS[i];
            ctx.lineWidth = 8;
            // 각 인덱스에 맞는 면 그리기
            if(i===0) ctx.moveTo(-20, -25), ctx.lineTo(20, -25); // 상 (빨강)
            if(i===1) ctx.moveTo(25, -20), ctx.lineTo(25, 20);   // 우 (황색)
            if(i===2) ctx.moveTo(-20, 25), ctx.lineTo(20, 25);   // 하 (초록)
            if(i===3) ctx.moveTo(-25, -20), ctx.lineTo(-25, 20); // 좌 (파랑)
            ctx.stroke();
        }
        ctx.restore();

        // --- 2. 적 이동 및 충돌 체크 ---
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let dx = 200 - e.x;
            let dy = 200 - e.y;
            let dist = Math.hypot(dx, dy);
            
            // 적을 중앙으로 이동
            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;

            // 적 그리기
            ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
            ctx.fill();

            // 충돌 판정
            if (dist < 30) {
                // 적이 들어오는 각도 계산
                let angleToCore = Math.atan2(e.y - 200, e.x - 200); 
                
                // 코어의 회전을 고려한 상대 각도 계산
                let relativeAngle = (angleToCore - rotation) % (Math.PI * 2);
                if (relativeAngle < 0) relativeAngle += Math.PI * 2;

                // 상대 각도를 면 인덱스로 변환 (0:상, 1:우, 2:하, 3:좌)
                let hitSide = Math.floor(((relativeAngle + Math.PI / 4) % (Math.PI * 2)) / (Math.PI / 2));
                let correctedSide = (hitSide + 3) % 4; // 12시 방향을 0으로 맞추기 위한 보정

                if (correctedSide === e.colorIndex) {
                    // 성공: 점수 획득
                    enemies.splice(i, 1);
                    score += 10;
                    scoreElement.innerText = `Score: ${score}`;
                    scoreElement.style.color = e.color;
                } else {
                    // 실패: 게임 오버
                    gameActive = false;
                    drawGameOver();
                    return; // 루프 즉시 종료
                }
            }
        }
        requestAnimationFrame(update);
    }

    // 게임 시작
    update();
</script>
</body>
</html>
