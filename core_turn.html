<!DOCTYPE html>
<html>
<head>
    <title>Echo Color Match</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #050505; cursor: pointer; }
        #ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        .msg { font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>COLOR ECHO</h1>
        <p class="msg">중앙을 클릭해 회전! 같은 색으로 방어하세요.</p>
        <h2 id="score">Score: 0</h2>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    canvas.width = 400;
    canvas.height = 400;

    // 설정
    const COLORS = ['#FF4444', '#FFD700', '#44FF44', '#4444FF']; // 빨, 황, 초, 파
    let score = 0;
    let rotation = 0; // 라디안 단위 회전값
    let enemies = [];
    let gameActive = true;

    // 1. 클릭 시 90도(Math.PI / 2)씩 회전
    canvas.addEventListener('mousedown', () => {
        if(!gameActive) { location.reload(); return; } // 게임오버 시 새로고침
        rotation += Math.PI / 2;
    });

    // 2. 적(조각) 생성 (랜덤 색상 부여)
    function spawnEnemy() {
        const angle = Math.random() * Math.PI * 2;
        const dist = 300;
        const colorIndex = Math.floor(Math.random() * 4);
        enemies.push({
            x: 200 + Math.cos(angle) * dist,
            y: 200 + Math.sin(angle) * dist,
            color: COLORS[colorIndex],
            colorIndex: colorIndex,
            speed: 1.2 + (score * 0.05),
            size: 12
        });
    }

    setInterval(() => { if(gameActive) spawnEnemy(); }, 1200);

    // 3. 메인 루프
    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- 중앙 코어 그리기 (4색 면) ---
        ctx.save();
        ctx.translate(200, 200);
        ctx.rotate(rotation);
        
        // 코어의 4면을 각기 다른 색으로 칠함
        for(let i=0; i<4; i++) {
            ctx.beginPath();
            ctx.strokeStyle = COLORS[i];
            ctx.lineWidth = 6;
            // 각 면에 해당하는 위치에 선 그리기
            if(i===0) ctx.moveTo(-20, -25), ctx.lineTo(20, -25); // 상 (빨)
            if(i===1) ctx.moveTo(25, -20), ctx.lineTo(25, 20);   // 우 (황)
            if(i===2) ctx.moveTo(-20, 25), ctx.lineTo(20, 25);   // 하 (초)
            if(i===3) ctx.moveTo(-25, -20), ctx.lineTo(-25, 20); // 좌 (파)
            ctx.stroke();
        }
        ctx.restore();

        // --- 적 이동 및 충돌 체크 ---
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let dx = 200 - e.x;
            let dy = 200 - e.y;
            let angleToCore = Math.atan2(dy, dx);
            
            e.x += Math.cos(angleToCore) * e.speed;
            e.y += Math.sin(angleToCore) * e.speed;

            // 적 그리기
            ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
            ctx.fill();

            // 충돌 판정
            let dist = Math.hypot(dx, dy);
            if (dist < 35) { // 판정 범위를 살짝 넓혀서 안정감 있게 수정
                
                // 1. 현재 코어가 몇 번 회전했는지 (0, 1, 2, 3)
                // Math.round를 사용해 미세한 오차를 잡고, 음수 방지를 위해 +8을 해줍니다.
                let rotStep = Math.round(rotation / (Math.PI / 2)) % 4;
                if (rotStep < 0) rotStep += 4;

                // 2. 적이 들어오는 방향 (0:상, 1:우, 2:하, 3:좌)
                // atan2의 결과를 90도 단위 인덱스로 변환
                let entrySide = (Math.round(angleToCore / (Math.PI / 2)) + 4) % 4;
                
                // 3. 현재 해당 방향을 막고 있는 코어의 실제 색상 인덱스 계산
                // 코어가 회전함에 따라 각 면의 색상이 상대적으로 변하는 것을 보정
                let activeColorIndex = (e.colorIndex + rotStep) % 4;

                // 판정 로직: 적의 방향(entrySide)과 코어의 색상면이 일치하는지 확인
                // 좀 더 직관적으로 '현재 진입한 면의 인덱스'를 체크하도록 로직을 강화했습니다.
                if (entrySide === (e.colorIndex + rotStep) % 4) {
                    // 성공!
                    enemies.splice(i, 1);
                    score += 10;
                    scoreElement.innerText = `Score: ${score}`;
                    scoreElement.style.color = e.color;
                    
                    // 성공 시 반짝이는 효과음 대신 콘솔 로그 (나중에 사운드 추가 지점)
                    console.log("Defended!");
                } else {
                    // 실패: 게임 오버
                    gameActive = false;
                    // ... (이후 게임 오버 연출은 동일)
                }
            }
        }
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
