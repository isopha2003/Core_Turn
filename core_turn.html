<!DOCTYPE html>
<html>
<head>
    <title>Core Turn - Fixed Version</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #050505; cursor: pointer; }
        #ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        .msg { font-size: 14px; color: #888; }
    </style>
</head>
<body>
            <div id="ui">
        <h1>CORE TURN</h1>
        <p class="msg">클릭해서 회전! 같은 색 면으로 조각을 막으세요.</p>
        <h2 id="score">Score: 0</h2>
        <div id="lives" style="font-size: 20px; margin-top: 10px; font-family: monospace; letter-spacing: 3px;"></div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const livesElement = document.getElementById('lives');

    canvas.width = 400;
    canvas.height = 400;

    const COLORS = ['#FF4444', '#FFD700', '#44FF44', '#4444FF']; // 0:빨(상), 1:황(우), 2:초(하), 3:파(좌)
    let score = 0;
    let rotationIndex = 0;
    let enemies = [];
    let gameActive = true;
    let combo = 0;
    let comboTimer = null;
    let particles = [];
    let lives = 3;
    let maxLives = 3;

    // 사운드 생성 함수
    let audioContext = new (window.AudioContext || window.webkitAudioContext)();
    let bgmPlaying = false;
    let bgmTimeout = null;
    
    // 배경음악 - 신나는 업비트 멜로디
    function playBGM() {
        if (bgmPlaying) return;
        bgmPlaying = true;
        
        // 신나고 경쾌한 멜로디 - 약 8초 루프
        const melody = [
            // 첫 번째 구간 (0-2초)
            { freq: 659.25, time: 0.0, duration: 0.3 },    // E
            { freq: 783.99, time: 0.3, duration: 0.3 },    // G
            { freq: 880.00, time: 0.6, duration: 0.4 },    // A
            { freq: 1046.50, time: 1.0, duration: 0.5 },   // C
            { freq: 880.00, time: 1.5, duration: 0.25 },   // A
            { freq: 783.99, time: 1.75, duration: 0.25 },  // G
            
            // 두 번째 구간 (2-4초)
            { freq: 659.25, time: 2.0, duration: 0.3 },    // E
            { freq: 783.99, time: 2.3, duration: 0.3 },    // G
            { freq: 659.25, time: 2.6, duration: 0.2 },    // E
            { freq: 587.33, time: 2.8, duration: 0.4 },    // D
            { freq: 659.25, time: 3.2, duration: 0.4 },    // E
            { freq: 783.99, time: 3.6, duration: 0.4 },    // G
            
            // 세 번째 구간 (4-6초)
            { freq: 880.00, time: 4.0, duration: 0.3 },    // A
            { freq: 1046.50, time: 4.3, duration: 0.3 },   // C
            { freq: 1174.66, time: 4.6, duration: 0.4 },   // D (높은음)
            { freq: 1046.50, time: 5.0, duration: 0.3 },   // C
            { freq: 880.00, time: 5.3, duration: 0.3 },    // A
            { freq: 783.99, time: 5.6, duration: 0.4 },    // G
            
            // 네 번째 구간 (6-8초)
            { freq: 659.25, time: 6.0, duration: 0.4 },    // E
            { freq: 587.33, time: 6.4, duration: 0.3 },    // D
            { freq: 659.25, time: 6.7, duration: 0.3 },    // E
            { freq: 783.99, time: 7.0, duration: 0.5 },    // G
            { freq: 880.00, time: 7.5, duration: 0.5 },    // A
        ];
        
        const loopDuration = 8.0;
        
        function playLoop() {
            if (!bgmPlaying) return;
            
            const startTime = audioContext.currentTime;
            
            melody.forEach(note => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.type = 'square';
                osc.frequency.value = note.freq;
                
                gain.gain.setValueAtTime(0, startTime + note.time);
                gain.gain.linearRampToValueAtTime(0.12, startTime + note.time + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + note.time + note.duration);
                
                osc.start(startTime + note.time);
                osc.stop(startTime + note.time + note.duration);
            });
            
            bgmTimeout = setTimeout(playLoop, loopDuration * 1000);
        }
        
        playLoop();
    }
    
    function stopBGM() {
        bgmPlaying = false;
        if (bgmTimeout) {
            clearTimeout(bgmTimeout);
            bgmTimeout = null;
        }
        // AudioContext 완전히 닫고 새로 생성
        if (audioContext) {
            audioContext.close();
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
    }
    
    function playRotateSound() {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = 400;
        oscillator.type = 'sine';
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.1);
    }
    
    function playSuccessSound() {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        // 콤보에 따라 음높이 변경
        oscillator.frequency.value = 800 + (combo * 50);
        oscillator.type = 'triangle';
        
        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.15);
    }
    
    function playComboSound(comboCount) {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(1500, audioContext.currentTime + 0.2);
        oscillator.type = 'square';
        
        gainNode.gain.setValueAtTime(0.25, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.2);
    }
    
    function playGameOverSound() {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.3);
        oscillator.type = 'sawtooth';
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.3);
    }

    canvas.addEventListener('mousedown', () => {
        // 첫 클릭에 BGM 시작 (브라우저 정책상 사용자 인터랙션 필요)
        if (!bgmPlaying && gameActive) {
            playBGM();
        }
        
        if(!gameActive) { 
            resetGame();
            return; 
        }
        rotationIndex = (rotationIndex + 1) % 4;
        playRotateSound();
    });

    function updateLivesDisplay() {
        let heartsHTML = '';
        for (let i = 0; i < lives; i++) {
            heartsHTML += '<span style="color: #44FF44;">●</span> ';
        }
        for (let i = lives; i < maxLives; i++) {
            heartsHTML += '<span style="color: #333;">●</span> ';
        }
        livesElement.innerHTML = heartsHTML;
    }

    function resetGame() {
        score = 0;
        enemies = [];
        rotationIndex = 0;
        gameActive = true;
        combo = 0;
        particles = [];
        lives = 3;
        if (comboTimer) clearTimeout(comboTimer);
        scoreElement.innerText = `Score: 0`;
        scoreElement.style.color = "white";
        updateLivesDisplay();
        
        // BGM 완전히 정지하고 재시작
        stopBGM();
        setTimeout(() => {
            playBGM();
        }, 100);
        
        update(); 
    }

    function spawnEnemy() {
        if(!gameActive) return;
        const angle = Math.random() * Math.PI * 2;
        const dist = 300;
        const colorIndex = Math.floor(Math.random() * 4);
        enemies.push({
            x: 200 + Math.cos(angle) * dist,
            y: 200 + Math.sin(angle) * dist,
            color: COLORS[colorIndex],
            colorIndex: colorIndex,
            speed: 1.5 + (score * 0.01),
            size: 10
        });
    }

    setInterval(spawnEnemy, 1000);

    function drawGameOver() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 35px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", 200, 190);
        ctx.font = "18px Arial";
        ctx.fillStyle = "#aaa";
        ctx.fillText(`Final Score: ${score}`, 200, 225);
        ctx.font = "14px Arial";
        ctx.fillText("클릭해서 다시 도전", 200, 260);
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 4분면 구분선 그리기 (가이드)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        
        // 수직선
        ctx.beginPath();
        ctx.moveTo(200, 0);
        ctx.lineTo(200, 400);
        ctx.stroke();
        
        // 수평선
        ctx.beginPath();
        ctx.moveTo(0, 200);
        ctx.lineTo(400, 200);
        ctx.stroke();
        
        ctx.setLineDash([]);

        // 파티클 그리기 및 업데이트
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 1;
            p.alpha = p.life / 30;
            
            ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${p.alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            
            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }

        // 콤보 표시
        if (combo > 1) {
            ctx.save();
            ctx.font = `bold ${30 + combo * 2}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillStyle = combo >= 10 ? '#FF00FF' : combo >= 5 ? '#FFD700' : '#FFF';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.strokeText(`${combo} COMBO!`, 200, 80);
            ctx.fillText(`${combo} COMBO!`, 200, 80);
            ctx.restore();
        }

        // 중앙 코어 그리기
        ctx.save();
        ctx.translate(200, 200);
        ctx.rotate(rotationIndex * (Math.PI / 2));
        
        for(let i=0; i<4; i++) {
            ctx.beginPath();
            ctx.strokeStyle = COLORS[i];
            ctx.lineWidth = 10;
            if(i===0) ctx.moveTo(-20, -25), ctx.lineTo(20, -25); // 상 (빨강)
            if(i===1) ctx.moveTo(25, -20), ctx.lineTo(25, 20);   // 우 (황색)
            if(i===2) ctx.moveTo(-20, 25), ctx.lineTo(20, 25);   // 하 (초록)
            if(i===3) ctx.moveTo(-25, -20), ctx.lineTo(-25, 20); // 좌 (파랑)
            ctx.stroke();
        }
        ctx.restore();

        // 적 이동 및 충돌 체크
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let dx = 200 - e.x;
            let dy = 200 - e.y;
            let dist = Math.hypot(dx, dy);
            
            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;

            ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
            ctx.fill();

            if (dist < 32) {
                // 적의 위치로 진입 방향 판단
                // 상(0), 우(1), 하(2), 좌(3)
                let relX = e.x - 200;
                let relY = e.y - 200;
                
                // 경계선 근처 판정을 위한 허용 범위
                const threshold = 0.7; // X와 Y 차이가 이 비율 이하면 경계선으로 간주
                
                let entrySides = []; // 가능한 진입 방향들
                
                if (Math.abs(relX) / Math.abs(relY) > threshold && Math.abs(relX) / Math.abs(relY) < 1/threshold) {
                    // 대각선 근처 - 두 방향 모두 체크
                    if (relX > 0 && relY > 0) {
                        entrySides = [1, 2]; // 우, 하
                    } else if (relX < 0 && relY > 0) {
                        entrySides = [3, 2]; // 좌, 하
                    } else if (relX < 0 && relY < 0) {
                        entrySides = [3, 0]; // 좌, 상
                    } else {
                        entrySides = [1, 0]; // 우, 상
                    }
                } else {
                    // 명확한 방향
                    if (Math.abs(relX) > Math.abs(relY)) {
                        entrySides = [relX > 0 ? 1 : 3]; // 우 or 좌
                    } else {
                        entrySides = [relY > 0 ? 2 : 0]; // 하 or 상
                    }
                }

                // 여러 방향 중 하나라도 색이 맞으면 성공
                let success = false;
                for (let side of entrySides) {
                    let currentColorIndexAtSide = (4 + side - rotationIndex) % 4;
                    if (e.colorIndex === currentColorIndexAtSide) {
                        success = true;
                        break;
                    }
                }

                // 디버그 출력
                console.log(`적 색상: ${e.colorIndex}, 진입 방향: ${entrySides}, 회전: ${rotationIndex}, 결과: ${success ? '✅' : '❌'}`);

                if (success) {
                    // 성공!
                    console.log('✅ 성공!');
                    playSuccessSound();
                    enemies.splice(i, 1);
                    
                    // 콤보 증가
                    combo++;
                    if (comboTimer) clearTimeout(comboTimer);
                    comboTimer = setTimeout(() => {
                        combo = 0;
                    }, 2000); // 2초 안에 다음 성공해야 콤보 유지
                    
                    // 콤보에 따른 점수 배율
                    let comboMultiplier = Math.min(combo, 10);
                    score += 10 * comboMultiplier;
                    
                    // 5콤보마다 목숨 회복!
                    if (combo % 5 === 0 && combo > 0 && lives < maxLives) {
                        lives++;
                        updateLivesDisplay();
                        // 목숨 회복 사운드
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(1200, audioContext.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1800, audioContext.currentTime + 0.3);
                        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                        osc.start(audioContext.currentTime);
                        osc.stop(audioContext.currentTime + 0.3);
                    }
                    
                    // 콤보 사운드 (3콤보 이상일 때)
                    if (combo >= 3 && combo % 3 === 0) {
                        playComboSound(combo);
                    }
                    
                    // 파티클 생성
                    for (let j = 0; j < 10 + combo; j++) {
                        const angle = (Math.PI * 2 * j) / (10 + combo);
                        const speed = 2 + Math.random() * 3;
                        const colorRGB = e.color === '#FF4444' ? [255, 68, 68] :
                                       e.color === '#FFD700' ? [255, 215, 0] :
                                       e.color === '#44FF44' ? [68, 255, 68] :
                                       [68, 68, 255];
                        particles.push({
                            x: e.x,
                            y: e.y,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            r: colorRGB[0],
                            g: colorRGB[1],
                            b: colorRGB[2],
                            alpha: 1,
                            life: 30,
                            size: 3 + Math.random() * 2
                        });
                    }
                    
                    scoreElement.innerText = `Score: ${score}`;
                    scoreElement.style.color = e.color;
                } else {
                    // 실패: 목숨 감소
                    console.log('❌ 실패!');
                    lives--;
                    combo = 0; // 콤보 리셋
                    updateLivesDisplay();
                    enemies.splice(i, 1);
                    
                    // 실패 사운드
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = 150;
                    osc.type = 'sawtooth';
                    gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    osc.start(audioContext.currentTime);
                    osc.stop(audioContext.currentTime + 0.2);
                    
                    // 목숨이 0이 되면 게임 오버
                    if (lives <= 0) {
                        console.log('💀 GAME OVER');
                        stopBGM();
                        playGameOverSound();
                        gameActive = false;
                        drawGameOver();
                        return;
                    }
                }
            }
        }
        requestAnimationFrame(update);
    }

    update();
    updateLivesDisplay();
</script>
</body>
</html>
