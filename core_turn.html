<!DOCTYPE html>
<html>
<head>
    <title>Core Turn - Fixed Version</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #050505; cursor: pointer; }
        #ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        #ui.hidden { display: none; }
        .msg { font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>CORE TURN</h1>
        <p class="msg">클릭해서 회전! 같은 색 면으로 조각을 막으세요.</p>
        <h2 id="score">Score: 0</h2>
        <p id="highscore" style="font-size: 14px; color: #FFD700; margin-top: 5px;">Best: 0</p>
        <div id="lives" style="font-size: 20px; margin-top: 10px; font-family: monospace; letter-spacing: 3px;"></div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const livesElement = document.getElementById('lives');
    const highScoreElement = document.getElementById('highscore');
    const uiElement = document.getElementById('ui');

    canvas.width = 400;
    canvas.height = 400;

    const COLORS = ['#FF4444', '#FFD700', '#44FF44', '#4444FF'];
    let score = 0;
    let rotationIndex = 0;
    let enemies = [];
    let gameActive = true;
    let combo = 0;
    let comboTimer = null;
    let particles = [];
    let lives = 3;
    let maxLives = 3;

    // ✅ Fix 1: localStorage를 try-catch로 감싸서 file:// 에러 방지
    let highScore = 0;
    try {
        highScore = parseInt(localStorage.getItem('coreturm_highscore')) || 0;
    } catch(e) {
        highScore = 0;
    }

    let gameStarted = false;
    let isSpawning = false;
    let nextSpawnTime = 0;

    // 오디오
    let audioContext = new (window.AudioContext || window.webkitAudioContext)();
    let bgmPlaying = false;
    let bgmTimeout = null;

    function playBGM() {
        if (bgmPlaying) return;
        bgmPlaying = true;
        const melody = [
            { freq: 659.25, time: 0.0, duration: 0.3 },
            { freq: 783.99, time: 0.3, duration: 0.3 },
            { freq: 880.00, time: 0.6, duration: 0.4 },
            { freq: 1046.50, time: 1.0, duration: 0.5 },
            { freq: 880.00, time: 1.5, duration: 0.25 },
            { freq: 783.99, time: 1.75, duration: 0.25 },
            { freq: 659.25, time: 2.0, duration: 0.3 },
            { freq: 783.99, time: 2.3, duration: 0.3 },
            { freq: 659.25, time: 2.6, duration: 0.2 },
            { freq: 587.33, time: 2.8, duration: 0.4 },
            { freq: 659.25, time: 3.2, duration: 0.4 },
            { freq: 783.99, time: 3.6, duration: 0.4 },
            { freq: 880.00, time: 4.0, duration: 0.3 },
            { freq: 1046.50, time: 4.3, duration: 0.3 },
            { freq: 1174.66, time: 4.6, duration: 0.4 },
            { freq: 1046.50, time: 5.0, duration: 0.3 },
            { freq: 880.00, time: 5.3, duration: 0.3 },
            { freq: 783.99, time: 5.6, duration: 0.4 },
            { freq: 659.25, time: 6.0, duration: 0.4 },
            { freq: 587.33, time: 6.4, duration: 0.3 },
            { freq: 659.25, time: 6.7, duration: 0.3 },
            { freq: 783.99, time: 7.0, duration: 0.5 },
            { freq: 880.00, time: 7.5, duration: 0.5 },
        ];
        const loopDuration = 8.0;
        function playLoop() {
            if (!bgmPlaying) return;
            const startTime = audioContext.currentTime;
            melody.forEach(note => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.type = 'square';
                osc.frequency.value = note.freq;
                gain.gain.setValueAtTime(0, startTime + note.time);
                gain.gain.linearRampToValueAtTime(0.12, startTime + note.time + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + note.time + note.duration);
                osc.start(startTime + note.time);
                osc.stop(startTime + note.time + note.duration);
            });
            bgmTimeout = setTimeout(playLoop, loopDuration * 1000);
        }
        playLoop();
    }

    function stopBGM() {
        bgmPlaying = false;
        if (bgmTimeout) { clearTimeout(bgmTimeout); bgmTimeout = null; }
        if (audioContext) {
            audioContext.close();
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playRotateSound() {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.frequency.value = 400; osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
        osc.start(audioContext.currentTime); osc.stop(audioContext.currentTime + 0.1);
    }

    function playSuccessSound() {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.frequency.value = 800 + (combo * 50); osc.type = 'triangle';
        gain.gain.setValueAtTime(0.2, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
        osc.start(audioContext.currentTime); osc.stop(audioContext.currentTime + 0.15);
    }

    function playComboSound() {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.frequency.setValueAtTime(1000, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1500, audioContext.currentTime + 0.2);
        osc.type = 'square';
        gain.gain.setValueAtTime(0.25, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
        osc.start(audioContext.currentTime); osc.stop(audioContext.currentTime + 0.2);
    }

    function playGameOverSound() {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.frequency.setValueAtTime(300, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.3);
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        osc.start(audioContext.currentTime); osc.stop(audioContext.currentTime + 0.3);
    }

    function spawnEnemy() {
        if (!gameActive || !gameStarted) return;
        isSpawning = true;

        const angle = Math.random() * Math.PI * 2;
        const dist = 300;
        const colorIndex = Math.floor(Math.random() * 4);
        let speedLevel = Math.floor(combo / 5);
        let speed = 0.8 + (speedLevel * 0.3);

        enemies.push({
            x: 200 + Math.cos(angle) * dist,
            y: 200 + Math.sin(angle) * dist,
            color: COLORS[colorIndex],
            colorIndex: colorIndex,
            speed: speed,
            size: 10
        });

        setTimeout(() => { isSpawning = false; }, 100);
    }

    function startSpawning() {
        isSpawning = false;
        // ✅ Fix 2: 첫 적은 1.5초 후 생성
        nextSpawnTime = Date.now() + 1500;
    }

    function stopSpawning() {
        isSpawning = false;
        nextSpawnTime = 0;
    }

    canvas.addEventListener('mousedown', (event) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;

        if (!gameStarted) {
            if (mouseX >= 115 && mouseX <= 285 && mouseY >= 318 && mouseY <= 362) {
                gameStarted = true;
                gameActive = true;
                enemies = [];
                particles = [];
                uiElement.classList.remove('hidden');
                startSpawning();
                playBGM();
                update();
            }
            return;
        }

        if (!gameActive) {
            if (mouseX >= 50 && mouseX <= 180 && mouseY >= 240 && mouseY <= 290) {
                resetGame();
                startSpawning();
                return;
            }
            if (mouseX >= 220 && mouseX <= 350 && mouseY >= 240 && mouseY <= 290) {
                gameStarted = false;
                gameActive = true;
                uiElement.classList.add('hidden');
                score = 0; combo = 0; enemies = []; particles = []; lives = 3; rotationIndex = 0;
                updateLivesDisplay();
                stopSpawning();
                stopBGM();
                drawMenu();
                return;
            }
            return;
        }

        rotationIndex = (rotationIndex + 1) % 4;
        playRotateSound();
    });

    function updateLivesDisplay() {
        let heartsHTML = '';
        for (let i = 0; i < lives; i++) heartsHTML += '<span style="color: #44FF44;">●</span> ';
        for (let i = lives; i < maxLives; i++) heartsHTML += '<span style="color: #333;">●</span> ';
        livesElement.innerHTML = heartsHTML;
    }

    function updateHighScore() {
        highScoreElement.innerText = `Best: ${highScore}`;
        if (score > highScore) {
            highScore = score;
            // ✅ Fix 1: localStorage try-catch
            try { localStorage.setItem('coreturm_highscore', highScore); } catch(e) {}
            highScoreElement.innerText = `Best: ${highScore}`;
            highScoreElement.style.color = '#FFD700';
        }
    }

    function resetGame() {
        score = 0; enemies = []; rotationIndex = 0;
        gameActive = true; gameStarted = true;
        combo = 0; particles = []; lives = 3;
        if (comboTimer) clearTimeout(comboTimer);
        scoreElement.innerText = `Score: 0`;
        scoreElement.style.color = "white";
        updateLivesDisplay();
        updateHighScore();
        stopBGM();
        setTimeout(() => { playBGM(); }, 100);
        update();
    }

    function drawGameOver() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.9)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 40px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", 200, 120);
        ctx.font = "20px Arial";
        ctx.fillStyle = "#aaa";
        ctx.fillText(`Final Score: ${score}`, 200, 160);
        if (score >= highScore && score > 0) {
            ctx.fillStyle = "#FFD700";
            ctx.font = "bold 22px Arial";
            ctx.fillText("NEW RECORD!", 200, 200);
        } else {
            ctx.fillStyle = "#888";
            ctx.font = "18px Arial";
            ctx.fillText(`Best: ${highScore}`, 200, 195);
        }
        ctx.fillStyle = "rgba(68, 255, 68, 0.2)";
        ctx.fillRect(50, 240, 130, 50);
        ctx.strokeStyle = "#44FF44"; ctx.lineWidth = 3;
        ctx.strokeRect(50, 240, 130, 50);
        ctx.fillStyle = "#44FF44"; ctx.font = "bold 18px Arial";
        ctx.fillText("RETRY", 115, 272);
        ctx.fillStyle = "rgba(255, 68, 68, 0.2)";
        ctx.fillRect(220, 240, 130, 50);
        ctx.strokeStyle = "#FF4444";
        ctx.strokeRect(220, 240, 130, 50);
        ctx.fillStyle = "#FF4444";
        ctx.fillText("QUIT", 285, 272);
        ctx.fillStyle = "#666"; ctx.font = "12px Arial";
        ctx.fillText("다시 도전", 115, 310);
        ctx.fillText("메뉴로", 285, 310);
    }

    function drawMenu() {
        if (gameStarted) return;
        ctx.fillStyle = "rgba(0, 0, 0, 0.95)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white"; ctx.font = "bold 50px Arial"; ctx.textAlign = "center";
        ctx.fillText("CORE TURN", 200, 100);
        ctx.save();
        ctx.translate(200, 200);
        const time = Date.now() / 1000;
        ctx.rotate(time * 0.5);
        for (let i = 0; i < 4; i++) {
            ctx.beginPath(); ctx.strokeStyle = COLORS[i]; ctx.lineWidth = 12;
            if (i === 0) { ctx.moveTo(-25, -30); ctx.lineTo(25, -30); }
            if (i === 1) { ctx.moveTo(30, -25); ctx.lineTo(30, 25); }
            if (i === 2) { ctx.moveTo(-25, 30); ctx.lineTo(25, 30); }
            if (i === 3) { ctx.moveTo(-30, -25); ctx.lineTo(-30, 25); }
            ctx.stroke();
        }
        ctx.restore();
        ctx.fillStyle = "#FFD700"; ctx.font = "24px Arial";
        ctx.fillText(`Best: ${highScore}`, 200, 290);
        const pulseScale = 1 + Math.sin(time * 3) * 0.05;
        ctx.save();
        ctx.translate(200, 340); ctx.scale(pulseScale, pulseScale);
        ctx.fillStyle = "rgba(68, 255, 68, 0.2)";
        ctx.fillRect(-85, -22, 170, 44);
        ctx.strokeStyle = "#44FF44"; ctx.lineWidth = 3;
        ctx.strokeRect(-85, -22, 170, 44);
        ctx.fillStyle = "#44FF44"; ctx.font = "bold 18px Arial";
        ctx.fillText("CLICK TO START", 0, 6);
        ctx.restore();
        ctx.fillStyle = "#888"; ctx.font = "14px Arial";
        ctx.fillText("같은 색 면으로 조각을 막으세요", 200, 380);
        requestAnimationFrame(drawMenu);
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // ✅ Fix 2: 시간 기반 적 생성 (nextSpawnTime이 설정된 경우만)
        if (gameStarted && nextSpawnTime > 0) {
            const now = Date.now();
            if (now >= nextSpawnTime && !isSpawning) {
                spawnEnemy();
                // 다음 기본 생성은 2.5초 후 (콤보 없을 때 fallback)
                nextSpawnTime = now + 2500;
            }
        }

        // 가이드선
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(200, 400); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 200); ctx.lineTo(400, 200); ctx.stroke();
        ctx.setLineDash([]);

        // 파티클
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life -= 1; p.alpha = p.life / 30;
            ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${p.alpha})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            if (p.life <= 0) particles.splice(i, 1);
        }

        // 콤보 표시
        if (combo > 1) {
            ctx.save();
            ctx.font = `bold ${30 + combo * 2}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillStyle = combo >= 10 ? '#FF00FF' : combo >= 5 ? '#FFD700' : '#FFF';
            ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
            ctx.strokeText(`${combo} COMBO!`, 200, 80);
            ctx.fillText(`${combo} COMBO!`, 200, 80);
            ctx.restore();
        }

        // 코어
        ctx.save();
        ctx.translate(200, 200);
        ctx.rotate(rotationIndex * (Math.PI / 2));
        for (let i = 0; i < 4; i++) {
            ctx.beginPath(); ctx.strokeStyle = COLORS[i]; ctx.lineWidth = 10;
            if (i === 0) { ctx.moveTo(-20, -25); ctx.lineTo(20, -25); }
            if (i === 1) { ctx.moveTo(25, -20); ctx.lineTo(25, 20); }
            if (i === 2) { ctx.moveTo(-20, 25); ctx.lineTo(20, 25); }
            if (i === 3) { ctx.moveTo(-25, -20); ctx.lineTo(-25, 20); }
            ctx.stroke();
        }
        ctx.restore();

        // 적 처리
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let dx = 200 - e.x;
            let dy = 200 - e.y;
            let dist = Math.hypot(dx, dy);

            let speedLevel = Math.floor(combo / 5);
            e.speed = 0.8 + (speedLevel * 0.3);
            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;

            ctx.fillStyle = e.color;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2); ctx.fill();

            if (dist < 32) {
                let relX = e.x - 200;
                let relY = e.y - 200;
                const threshold = 0.7;
                let entrySides = [];

                if (Math.abs(relX) / Math.abs(relY) > threshold && Math.abs(relX) / Math.abs(relY) < 1 / threshold) {
                    if (relX > 0 && relY > 0) entrySides = [1, 2];
                    else if (relX < 0 && relY > 0) entrySides = [3, 2];
                    else if (relX < 0 && relY < 0) entrySides = [3, 0];
                    else entrySides = [1, 0];
                } else {
                    if (Math.abs(relX) > Math.abs(relY)) entrySides = [relX > 0 ? 1 : 3];
                    else entrySides = [relY > 0 ? 2 : 0];
                }

                let success = false;
                for (let side of entrySides) {
                    let currentColorIndexAtSide = (4 + side - rotationIndex) % 4;
                    if (e.colorIndex === currentColorIndexAtSide) { success = true; break; }
                }

                enemies.splice(i, 1);

                if (success) {
                    playSuccessSound();
                    combo++;

                    // ✅ Fix 2 핵심: 성공 시 콤보 타이머를 넉넉하게 (4초)
                    if (comboTimer) clearTimeout(comboTimer);
                    comboTimer = setTimeout(() => { combo = 0; }, 4000);

                    // ✅ Fix 2 핵심: 성공 직후 0.8초 뒤에 바로 다음 적 생성
                    nextSpawnTime = Date.now() + 800;

                    let comboMultiplier = Math.min(combo, 10);
                    score += 10 * comboMultiplier;

                    if (combo % 5 === 0 && combo > 0 && lives < maxLives) {
                        lives++;
                        updateLivesDisplay();
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain); gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(1200, audioContext.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1800, audioContext.currentTime + 0.3);
                        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                        osc.start(audioContext.currentTime); osc.stop(audioContext.currentTime + 0.3);
                    }

                    if (combo >= 3 && combo % 3 === 0) playComboSound();

                    for (let j = 0; j < 10 + combo; j++) {
                        const angle = (Math.PI * 2 * j) / (10 + combo);
                        const speed = 2 + Math.random() * 3;
                        const colorRGB = e.color === '#FF4444' ? [255, 68, 68] :
                                         e.color === '#FFD700' ? [255, 215, 0] :
                                         e.color === '#44FF44' ? [68, 255, 68] :
                                         [68, 68, 255];
                        particles.push({
                            x: e.x, y: e.y,
                            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                            r: colorRGB[0], g: colorRGB[1], b: colorRGB[2],
                            alpha: 1, life: 30, size: 3 + Math.random() * 2
                        });
                    }

                    scoreElement.innerText = `Score: ${score}`;
                    scoreElement.style.color = e.color;
                    updateHighScore();

                } else {
                    lives--;
                    combo = 0;
                    if (comboTimer) clearTimeout(comboTimer);
                    updateLivesDisplay();

                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain); gain.connect(audioContext.destination);
                    osc.frequency.value = 150; osc.type = 'sawtooth';
                    gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    osc.start(audioContext.currentTime); osc.stop(audioContext.currentTime + 0.2);

                    if (lives <= 0) {
                        updateHighScore();
                        stopSpawning();
                        stopBGM();
                        playGameOverSound();
                        gameActive = false;
                        drawGameOver();
                        return;
                    }

                    // 실패 후 다음 적은 2초 뒤
                    nextSpawnTime = Date.now() + 2000;
                }
            }
        }
        requestAnimationFrame(update);
    }

    uiElement.classList.add('hidden');
    drawMenu();
    updateHighScore();
</script>
</body>
</html>
