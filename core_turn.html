<!DOCTYPE html>
<html>
<head>
    <title>Echo Puzzle Prototype</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { border: 2px solid #444; background: #000; cursor: pointer; }
        #ui { position: absolute; top: 20px; pointer-events: none; text-align: center; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>ECHO PUZZLE</h1>
        <p>화면을 클릭하면 코어가 회전합니다!</p>
        <h2 id="score">Score: 0</h2>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    canvas.width = 400;
    canvas.height = 400;

    let score = 0;
    let rotation = 0;
    let particles = [];
    let enemies = [];
    let gameActive = true;

    // 1. 코어 설정 (유저가 회전시키는 중앙 부분)
    const core = { x: 200, y: 200, size: 40 };

    // 클릭 시 회전
    canvas.addEventListener('mousedown', () => {
        rotation += Math.PI / 4; // 45도씩 회전
    });

    // 2. 적(조각) 생성 함수
    function spawnEnemy() {
        const angle = Math.random() * Math.PI * 2;
        const dist = 300;
        enemies.push({
            x: core.x + Math.cos(angle) * dist,
            y: core.y + Math.sin(angle) * dist,
            speed: 1.5 + (score * 0.1), // 갈수록 빨라짐
            size: 15
        });
    }

    setInterval(() => { if(gameActive) spawnEnemy(); }, 1500);

    // 3. 게임 루프
    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 중앙 코어 그리기 (회전 표현)
        ctx.save();
        ctx.translate(core.x, core.y);
        ctx.rotate(rotation);
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 5;
        ctx.strokeRect(-core.size/2, -core.size/2, core.size, core.size);
        ctx.restore();

        // 적 이동 및 충돌 체크
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let angleToCore = Math.atan2(core.y - e.y, core.x - e.x);
            
            e.x += Math.cos(angleToCore) * e.speed;
            e.y += Math.sin(angleToCore) * e.speed;

            // 그리기
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(e.x - 7, e.y - 7, 15, 15);

            // 충돌 감지 (코어에 닿았을 때)
            let dist = Math.hypot(core.x - e.x, core.y - e.y);
            if (dist < core.size / 2 + 5) {
                // 현재 코어의 회전 각도와 적이 들어온 각도가 맞는지 체크 (간단화된 로직)
                // 여기서는 일단 닿으면 점수 획득으로 처리 (실제로는 각도를 맞춰야 함)
                enemies.splice(i, 1);
                score += 10;
                scoreElement.innerText = `Score: ${score}`;
                
                // 화면 흔들림 효과 대신 콘솔 출력
                console.log("Hit!");
            }
        }

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
