<!DOCTYPE html>
<html>
<head>
    <title>Core Turn</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #050505; cursor: pointer; }
        #ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        .msg { font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>CORE TURN</h1>
        <p class="msg">클릭해서 회전! 같은 색 면으로 조각을 막으세요.</p>
        <h2 id="score">Score: 0</h2>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    canvas.width = 400;
    canvas.height = 400;

    const COLORS = ['#FF4444', '#FFD700', '#44FF44', '#4444FF']; // 빨, 황, 초, 파
    let score = 0;
    let rotation = 0; 
    let enemies = [];
    let gameActive = true;

    canvas.addEventListener('mousedown', () => {
        if(!gameActive) { 
            // 게임 오버 상태에서 클릭하면 초기화
            score = 0;
            enemies = [];
            rotation = 0;
            gameActive = true;
            scoreElement.innerText = `Score: 0`;
            update(); 
            return; 
        }
        rotation += Math.PI / 2;
    });

    function spawnEnemy() {
        if(!gameActive) return;
        const angle = Math.random() * Math.PI * 2;
        const dist = 300;
        const colorIndex = Math.floor(Math.random() * 4);
        enemies.push({
            x: 200 + Math.cos(angle) * dist,
            y: 200 + Math.sin(angle) * dist,
            color: COLORS[colorIndex],
            colorIndex: colorIndex,
            speed: 1.5 + (score * 0.02), // 난이도 상승폭 조정
            size: 10
        });
    }

    setInterval(spawnEnemy, 1000);

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- 중앙 코어 그리기 ---
        ctx.save();
        ctx.translate(200, 200);
        ctx.rotate(rotation);
        
        for(let i=0; i<4; i++) {
            ctx.beginPath();
            ctx.strokeStyle = COLORS[i];
            ctx.lineWidth = 8;
            if(i===0) ctx.moveTo(-20, -25), ctx.lineTo(20, -25); // 상
            if(i===1) ctx.moveTo(25, -20), ctx.lineTo(25, 20);   // 우
            if(i===2) ctx.moveTo(-20, 25), ctx.lineTo(20, 25);   // 하
            if(i===3) ctx.moveTo(-25, -20), ctx.lineTo(-25, 20); // 좌
            ctx.stroke();
        }
        ctx.restore();

        // --- 적 이동 및 충돌 체크 ---
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let dx = 200 - e.x;
            let dy = 200 - e.y;
            let angleToCore = Math.atan2(dy, dx);
            
            e.x += Math.cos(angleToCore) * e.speed;
            e.y += Math.sin(angleToCore) * e.speed;

            ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
            ctx.fill();

            let dist = Math.hypot(dx, dy);
            if (dist < 32) {
                // 1. 적이 들어오는 방향 인덱스 (0:상, 1:우, 2:하, 3:좌)
                let entrySide = (Math.round(angleToCore / (Math.PI / 2)) + 4) % 4;
                
                // 2. 현재 회전 상태를 인덱스로 변환
                let rotStep = (Math.round(rotation / (Math.PI / 2)) % 4 + 4) % 4;
                
                // 3. 현재 진입 방향(entrySide)에 위치한 코어의 실제 색상 계산
                // 공식: (면의 원래 색상 인덱스 + 현재 회전 단계) % 4 가 진입 방향과 같아야 함
                let coreColorAtEntry = (e.colorIndex + rotStep) % 4;

                if (entrySide === coreColorAtEntry) {
                    enemies.splice(i, 1);
                    score += 10;
                    scoreElement.innerText = `Score: ${score}`;
                    scoreElement.style.color = e.color;
                } else {
                    // 실패: 게임 오버 처리
                    gameActive = false;
                    ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "white";
                    ctx.font = "bold 35px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText("GAME OVER", 200, 190);
                    ctx.font = "18px Arial";
                    ctx.fillStyle = "#aaa";
                    ctx.fillText(`Final Score: ${score}`, 200, 225);
                    ctx.font = "14px Arial";
                    ctx.fillText("클릭해서 다시 도전", 200, 260);
                }
            }
        }
        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
