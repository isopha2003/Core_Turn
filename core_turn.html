<!DOCTYPE html>
<html>
<head>
    <title>Core Turn - Perfect Version</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #050505; cursor: pointer; }
        #ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        .msg { font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>CORE TURN</h1>
        <p class="msg">클릭해서 회전! 같은 색 면으로 조각을 막으세요.</p>
        <h2 id="score">Score: 0</h2>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    canvas.width = 400;
    canvas.height = 400;

    const COLORS = ['#FF4444', '#FFD700', '#44FF44', '#4444FF']; // 0:빨, 1:황, 2:초, 3:파
    let score = 0;
    let rotationIndex = 0; // 0, 1, 2, 3 (90도 단위 정수 관리)
    let enemies = [];
    let gameActive = true;

    canvas.addEventListener('mousedown', () => {
        if(!gameActive) { 
            resetGame();
            return; 
        }
        // 시계 방향 회전 (0 -> 1 -> 2 -> 3)
        rotationIndex = (rotationIndex + 1) % 4;
    });

    function resetGame() {
        score = 0;
        enemies = [];
        rotationIndex = 0;
        gameActive = true;
        scoreElement.innerText = `Score: 0`;
        scoreElement.style.color = "white";
        update(); 
    }

    function spawnEnemy() {
        if(!gameActive) return;
        const angle = Math.random() * Math.PI * 2;
        const dist = 300;
        const colorIndex = Math.floor(Math.random() * 4);
        enemies.push({
            x: 200 + Math.cos(angle) * dist,
            y: 200 + Math.sin(angle) * dist,
            color: COLORS[colorIndex],
            colorIndex: colorIndex,
            speed: 1.5 + (score * 0.01), // 난이도 조절
            size: 10
        });
    }

    setInterval(spawnEnemy, 1000);

    function drawGameOver() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 35px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", 200, 190);
        ctx.font = "18px Arial";
        ctx.fillStyle = "#aaa";
        ctx.fillText(`Final Score: ${score}`, 200, 225);
        ctx.font = "14px Arial";
        ctx.fillText("클릭해서 다시 도전", 200, 260);
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- 1. 중앙 코어 그리기 ---
        ctx.save();
        ctx.translate(200, 200);
        // 정수 인덱스를 실제 라디안 각도로 변환하여 회전
        ctx.rotate(rotationIndex * (Math.PI / 2));
        
        for(let i=0; i<4; i++) {
            ctx.beginPath();
            ctx.strokeStyle = COLORS[i];
            ctx.lineWidth = 10;
            if(i===0) ctx.moveTo(-20, -25), ctx.lineTo(20, -25); // 상 (빨강)
            if(i===1) ctx.moveTo(25, -20), ctx.lineTo(25, 20);   // 우 (황색)
            if(i===2) ctx.moveTo(-20, 25), ctx.lineTo(20, 25);   // 하 (초록)
            if(i===3) ctx.moveTo(-25, -20), ctx.lineTo(-25, 20); // 좌 (파랑)
            ctx.stroke();
        }
        ctx.restore();

        // --- 2. 적 이동 및 충돌 체크 ---
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let dx = 200 - e.x;
            let dy = 200 - e.y;
            let dist = Math.hypot(dx, dy);
            
            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;

            ctx.fillStyle = e.color;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
            ctx.fill();

            if (dist < 32) {
                // [수정 포인트 1] 적이 들어오는 방향을 0, 1, 2, 3으로 단순화
                // 상:0, 우:1, 하:2, 좌:3
                let angle = Math.atan2(dy, dx); // -PI ~ PI
                let normalizedAngle = (angle * 180 / Math.PI + 360 + 90) % 360; 
                let entrySide = Math.floor(normalizedAngle / 90) % 4;

                // [수정 포인트 2] 현재 회전 상태에서 각 방향(Side)에 위치한 색상 인덱스 계산
                // 코어가 시계방향으로 90도(rotationIndex 1) 돌면, 
                // 원래 상단(0)에 있던 색은 우측(1)으로 이동합니다.
                // 즉, 현재 entrySide 위치에 있는 색상의 인덱스는 다음과 같습니다.
                let currentColorIndexAtSide = (entrySide - rotationIndex + 4) % 4;

                if (e.colorIndex === currentColorIndexAtSide) {
                    // 성공!
                    enemies.splice(i, 1);
                    score += 10;
                    scoreElement.innerText = `Score: ${score}`;
                    scoreElement.style.color = e.color;
                } else {
                    // 실패: 게임 오버
                    gameActive = false;
                    drawGameOver();
                    return; 
                }
            }
        }
        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
